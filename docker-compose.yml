version: '3.9'

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: laf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lostnfound
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: lostandfound
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lostnfound -d lostandfound"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Express API Server ───────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: laf_server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://lostnfound:secret123@postgres:5432/lostandfound
      CLIENT_ORIGIN: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_refresh_too}
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── React Client (Nginx) ─────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: laf_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  postgres_data:
