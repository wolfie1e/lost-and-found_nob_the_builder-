name: CD — Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/laf-server:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/laf-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.PROD_API_URL }}
          tags: ${{ secrets.DOCKER_USERNAME }}/laf-client:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/laf-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Add your deploy step here (e.g., SSH to VPS, Railway deploy, Render hook)
